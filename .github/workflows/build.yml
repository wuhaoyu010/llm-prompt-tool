name: Build Cross-Platform Executables

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ============================================
  # Windows 版本构建
  # ============================================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Windows executable
        run: |
          pyinstaller --clean --noconfirm prompt_tool.spec

      - name: Package Windows build
        run: |
          cd dist
          7z a -tzip PromptTool-Windows.zip PromptTool\

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: PromptTool-Windows
          path: dist/PromptTool-Windows.zip
          retention-days: 30

  # ============================================
  # Linux 版本构建
  # ============================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc libjpeg-dev zlib1g-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build Linux executable
        run: |
          pyinstaller --clean --noconfirm prompt_tool.spec

      - name: Package Linux build
        run: |
          cd dist
          tar -czf PromptTool-Linux.tar.gz PromptTool/

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: PromptTool-Linux
          path: dist/PromptTool-Linux.tar.gz
          retention-days: 30

  # ============================================
  # Docker 镜像构建
  # ============================================
  build-docker:
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t prompt-tool:${{ github.sha }} .
          docker save prompt-tool:${{ github.sha }} | gzip > prompt-tool-docker.tar.gz

      - name: Upload Docker artifact
        uses: actions/upload-artifact@v4
        with:
          name: PromptTool-Docker
          path: prompt-tool-docker.tar.gz
          retention-days: 30

  # ============================================
  # 创建 GitHub Release (仅在推送 tag 时执行)
  # ============================================
  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-docker]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/PromptTool-Windows/PromptTool-Windows.zip
            artifacts/PromptTool-Linux/PromptTool-Linux.tar.gz
            artifacts/PromptTool-Docker/prompt-tool-docker.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
