name: Build Multi-Platform Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            ext: .exe
          - os: macos-latest
            platform: macos
            ext: ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build frontend
        run: |
          cd src/frontend
          npm install
          npm run build
        shell: bash

      - name: Build with PyInstaller (Windows)
        if: matrix.platform == 'windows'
        run: |
          pyinstaller prompt_tool.spec --noconfirm
        shell: bash

      - name: Build with PyInstaller (macOS)
        if: matrix.platform == 'macos'
        run: |
          pyinstaller prompt_tool.spec --noconfirm
        shell: bash

      - name: Create archive (Windows)
        if: matrix.platform == 'windows'
        run: |
          cd dist
          Compress-Archive -Path PromptTool -DestinationPath PromptTool-${{ matrix.platform }}.zip

      - name: Create archive (macOS)
        if: matrix.platform == 'macos'
        run: |
          cd dist
          zip -r PromptTool-${{ matrix.platform }}.zip PromptTool.app || zip -r PromptTool-${{ matrix.platform }}.zip PromptTool

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PromptTool-${{ matrix.platform }}
          path: dist/PromptTool-${{ matrix.platform }}.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: PromptTool-windows
          path: ./artifacts

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: PromptTool-macos
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./artifacts/*.zip
          generate_release_notes: true
