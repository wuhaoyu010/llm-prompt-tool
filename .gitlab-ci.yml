stages:
  - build
  - release

build-windows:
  stage: build
  tags:
    - windows
  only:
    - tags
    - main
  script:
    - python -m pip install --upgrade pip
    - pip install pyinstaller
    - pip install -r requirements.txt
    - cd src/frontend && npm install && npm run build && cd ../..
    - pyinstaller prompt_tool.spec --noconfirm
    - cd dist && Compress-Archive -Path PromptTool -DestinationPath PromptTool-windows.zip
  artifacts:
    paths:
      - dist/PromptTool-windows.zip
    expire_in: 1 week

build-macos:
  stage: build
  tags:
    - macos
  only:
    - tags
    - main
  script:
    - python3 -m pip install --upgrade pip
    - pip3 install pyinstaller
    - pip3 install -r requirements.txt
    - cd src/frontend && npm install && npm run build && cd ../..
    - pyinstaller prompt_tool.spec --noconfirm
    - cd dist && zip -r PromptTool-macos.zip PromptTool.app || zip -r PromptTool-macos.zip PromptTool
  artifacts:
    paths:
      - dist/PromptTool-macos.zip
    expire_in: 1 week

release:
  stage: release
  tags:
    - linux
  only:
    - tags
  script:
    - echo "Release $CI_COMMIT_TAG"
  artifacts:
    paths:
      - dist/PromptTool-windows.zip
      - dist/PromptTool-macos.zip
    expire_in: never
